<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Card</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Raleway:wght@300;400;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  @page { size: 8.5in 11in; margin: 0; }
  html, body { background:#e8e8e8; }
  body {
    font-family:'Lato',sans-serif; font-weight:300;
    display:flex; flex-direction:column; align-items:center; padding:20px 0;
  }

  .toolbar { margin-bottom:16px; display:flex; gap:10px; align-items:center; }
  .toolbar button {
    background:#4AABBF; color:#fff; border:none; padding:10px 20px;
    border-radius:6px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Lato',sans-serif;
  }
  .toolbar button:hover { background:#3a96a8; }
  .toolbar .hint { font-size:12px; color:#777; }

  /* CARD — exact tester dimensions: 528 x 720px = 5.5 x 7.5in @96dpi */
  .card-shell {
    width:528px; height:720px; position:relative; overflow:hidden;
    background:#fff; box-shadow:0 4px 24px rgba(0,0,0,.2);
  }
  .crop { position:absolute; background:#000; z-index:10; }
  .crop.tl-h { top:24px; left:0; width:17px; height:.5px; }
  .crop.tl-v { top:0; left:24px; width:.5px; height:17px; }
  .crop.tr-h { top:24px; right:0; width:17px; height:.5px; }
  .crop.tr-v { top:0; right:24px; width:.5px; height:17px; }
  .crop.bl-h { bottom:24px; left:0; width:17px; height:.5px; }
  .crop.bl-v { bottom:0; left:24px; width:.5px; height:17px; }
  .crop.br-h { bottom:24px; right:0; width:17px; height:.5px; }
  .crop.br-v { bottom:0; right:24px; width:.5px; height:17px; }

  .card-page { position:absolute; top:24px; left:24px; right:24px; bottom:24px; display:flex; flex-direction:column; }

  .card-logo-area { height:220px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:#fff; }
  .card-logo-area img { height:218px; width:auto; max-width:480px; object-fit:contain; }
  .card-logo-placeholder { width:100%; height:173px; display:flex; align-items:center; justify-content:center; }
  .card-logo-placeholder span { color:#1a1a1a; font-family:'Raleway',sans-serif; font-weight:700; font-size:30px; text-align:center; line-height:1.2; text-transform:uppercase; letter-spacing:.04em; padding:0 20px; }

  .card-banner { padding:17px 24px; margin:0 -48px; text-align:center; flex-shrink:0; display:flex; align-items:center; justify-content:center; min-height:72px; }
  .card-banner h1 { font-family:'Raleway',sans-serif; font-weight:600; font-size:21px; color:#fff; letter-spacing:.04em; text-transform:uppercase; line-height:1.25; margin:0; max-width:432px; }

  .card-body { display:flex; flex-direction:row; gap:17px; padding:14px 14px 10px; flex:1; min-height:0; }
  .card-col-left { flex:1.1; overflow:hidden; }
  .card-desc { font-family:'Lato',sans-serif; font-weight:300; font-size:14px; color:#2a2a2a; line-height:1.5; display:-webkit-box; -webkit-line-clamp:15; -webkit-box-orient:vertical; overflow:hidden; }

  .card-col-right { flex:0.75; display:flex; flex-direction:column; gap:14px; }
  .card-section-label { font-family:'Lato',sans-serif; font-weight:700; font-size:11.5px; color:#2a2a2a; text-align:center; display:flex; align-items:center; justify-content:center; padding:6px 0; }

  .card-terpene-box { padding:10px 9px; min-height:120px; display:flex; align-items:flex-start; justify-content:center; }
  .card-terpene-list { font-family:'Lato',sans-serif; font-weight:400; font-size:19px; color:#2a2a2a; text-align:center; line-height:1.6; display:flex; flex-direction:column; align-items:center; gap:4px; }

  .card-cannab-table { width:100%; border-collapse:collapse; }
  .card-cannab-table td { color:#1a1a1a; text-align:center; padding:10px 3px; font-family:'Lato',sans-serif; width:50%; }
  .cannab-n { font-weight:700; font-size:12.5px; display:block; letter-spacing:.03em; }
  .cannab-v { font-weight:700; font-size:12.5px; display:block; margin-top:2px; }

  .card-strain { border:1px solid #2a2a2a; padding:8px 10px; font-family:'Lato',sans-serif; font-size:9px; color:#2a2a2a; line-height:1.7; flex-shrink:0; }
  .card-strain strong { font-weight:700; }
  .card-strain .sr-row { display:flex; }
  .card-strain .sr-row strong { width:48px; flex-shrink:0; }
  .card-strain .sr-row span { white-space:nowrap; }
  .brand-line { text-align:center; margin-top:4px; font-weight:700; text-transform:uppercase; }

  @media print {
    html, body { background:#fff; margin:0; padding:0; }
    body {
      width:8.5in; height:11in;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      -webkit-print-color-adjust:exact; print-color-adjust:exact;
    }
    .toolbar { display:none; }
    .card-shell { box-shadow:none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.print()">🖨 Print / Save PDF</button>
  <span class="hint">Paper: Custom 5.5×7.5in · Margins: None · Background graphics: ON</span>
</div>

<div class="card-shell">
  <div class="crop tl-h"></div><div class="crop tl-v"></div>
  <div class="crop tr-h"></div><div class="crop tr-v"></div>
  <div class="crop bl-h"></div><div class="crop bl-v"></div>
  <div class="crop br-h"></div><div class="crop br-v"></div>
  <div class="card-page">
    <div class="card-logo-area" id="logo"></div>
    <div class="card-banner" id="banner"><h1 id="name"></h1></div>
    <div class="card-body">
      <div class="card-col-left"><p class="card-desc" id="desc"></p></div>
      <div class="card-col-right">
        <div>
          <div class="card-section-label">Prominent Terpenes</div>
          <div class="card-terpene-box" id="terpBox"><div class="card-terpene-list" id="terps"></div></div>
        </div>
        <div>
          <div class="card-section-label">Primary Cannabinoids</div>
          <table class="card-cannab-table"><tr>
            <td id="thcCell"><span class="cannab-n">THC</span><span class="cannab-v" id="thc"></span></td>
            <td id="cbdCell"><span class="cannab-n">CBD</span><span class="cannab-v" id="cbd"></span></td>
          </tr></table>
        </div>
        <div class="card-strain">
          <div class="sr-row"><strong>Strain:</strong><span id="species"></span></div>
          <div class="sr-row"><strong>Region:</strong><span id="region"></span></div>
          <div class="sr-row"><strong>Category:</strong><span id="brand"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function round1(n){ return Math.round(n*10)/10; }

var params = new URLSearchParams(window.location.search);
var parts = (params.get('data') || '').split('~|~|~');

var productName = parts[0]  || '';
var brandName   = parts[1]  || '';
var species     = parts[2]  || '';
var subcategory = parts[3]  || '';
var thcMin      = parts[4]  || '';
var thcMax      = parts[5]  || '';
var cbdMin      = parts[6]  || '';
var cbdMax      = parts[7]  || '';
var terp1       = (parts[8]  || '').trim();
var terp2       = (parts[9]  || '').trim();
var terp3       = (parts[10] || '').trim();
var region      = parts[11] || '';
var logoUrl     = parts[12] || '';
var description = parts[13] || '';

var sp = species.toUpperCase();
var cBanner='#74C6EA', cThc='#97D6EF', cCbd='#ACDFF2', cTerp='#DBF0FA';
if (sp.indexOf('SATIVA')!==-1) { cBanner='#F58A34'; cThc='#F7A45D'; cCbd='#F8B670'; cTerp='#FCDFBC'; }
else if (sp.indexOf('HYBRID')!==-1 || sp.indexOf('BLEND')!==-1) { cBanner='#58C369'; cThc='#79CF85'; cCbd='#9CDEA7'; cTerp='#D1F2D8'; }

var combined = (subcategory + ' ').toUpperCase();
var pctCats = ['FLOWER','PRE-ROLL','PRE-ROLLS','PREROLL','INHALABLE'];
var usePct = pctCats.some(function(c){ return combined.indexOf(c)!==-1; });
function fmtRange(min,max){
  var lo=parseFloat(min), hi=parseFloat(max);
  if (usePct){
    lo=lo/10; hi=hi/10;
    if (isNaN(lo)&&isNaN(hi)) return '—';
    if (lo===0||isNaN(lo)) return '< '+round1(hi)+'%';
    if (isNaN(hi)||lo===hi) return round1(lo)+'%';
    return round1(lo)+'–'+round1(hi)+'%';
  }
  if (isNaN(lo)&&isNaN(hi)) return '—';
  if (lo===0||isNaN(lo)) return '< '+round1(hi)+' mg/g';
  if (isNaN(hi)||lo===hi) return round1(lo)+' mg/g';
  return round1(lo)+'–'+round1(hi)+' mg/g';
}

var norm = [terp1,terp2,terp3].map(function(t){ return t.toUpperCase().replace(/[_\s]/g,''); });
var terpsHtml, terpHeight='120px', terpFont='19px';
if (!terp1) { terpsHtml='Some terpenes may be present'; terpHeight='36px'; terpFont='12px'; }
else if (norm.indexOf('TERPENESREMOVED')!==-1) { terpsHtml='Terpenes Removed'; terpHeight='36px'; terpFont='12px'; }
else if (norm.indexOf('TERPENEVARIES')!==-1 || norm.indexOf('TERPENESVARY')!==-1) { terpsHtml='Terpenes Vary'; terpHeight='36px'; terpFont='12px'; }
else { terpsHtml=[terp1,terp2,terp3].filter(function(t){return t;}).map(function(t){return '<span>'+esc(t)+'</span>';}).join(''); }

var logoHtml = logoUrl
  ? '<img src="'+esc(logoUrl)+'" alt="">'
  : '<div class="card-logo-placeholder"><span>'+esc(brandName||'BRAND')+'</span></div>';

document.getElementById('logo').innerHTML = logoHtml;
document.getElementById('banner').style.background = cBanner;
document.getElementById('name').textContent = productName;
document.getElementById('desc').textContent = description;
document.getElementById('terpBox').style.background = cTerp;
document.getElementById('terpBox').style.minHeight = terpHeight;
var terpsEl = document.getElementById('terps');
terpsEl.innerHTML = terpsHtml;
terpsEl.style.fontSize = terpFont;
document.getElementById('thcCell').style.background = cThc;
document.getElementById('cbdCell').style.background = cCbd;
document.getElementById('thc').textContent = fmtRange(thcMin,thcMax);
document.getElementById('cbd').textContent = fmtRange(cbdMin,cbdMax);
document.getElementById('species').textContent = species || '—';
document.getElementById('region').textContent = region || '—';
document.getElementById('brand').textContent = (subcategory || '').toUpperCase();
document.title = productName || 'Product Card';
</script>
</body>
</html>
