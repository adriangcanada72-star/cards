<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Card — Diagonal</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Raleway:wght@300;400;600;700;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  @page { size: 8.5in 11in; margin: 0; }
  html, body { background:#e8e8e8; }
  body { font-family:'Lato',sans-serif; font-weight:300; display:flex; flex-direction:column; align-items:center; padding:20px 0; }
  .toolbar { margin-bottom:16px; display:flex; gap:10px; align-items:center; }
  .toolbar button { background:#4AABBF; color:#fff; border:none; padding:10px 20px; border-radius:6px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Lato',sans-serif; }
  .toolbar .hint { font-size:12px; color:#777; }

  .card-shell { width:528px; height:720px; position:relative; overflow:hidden; background:#fff; box-shadow:0 4px 24px rgba(0,0,0,.2); }
  .crop { position:absolute; background:#000; z-index:20; }
  .crop.tl-h{top:24px;left:0;width:17px;height:.5px}.crop.tl-v{top:0;left:24px;width:.5px;height:17px}
  .crop.tr-h{top:24px;right:0;width:17px;height:.5px}.crop.tr-v{top:0;right:24px;width:.5px;height:17px}
  .crop.bl-h{bottom:24px;left:0;width:17px;height:.5px}.crop.bl-v{bottom:0;left:24px;width:.5px;height:17px}
  .crop.br-h{bottom:24px;right:0;width:17px;height:.5px}.crop.br-v{bottom:0;right:24px;width:.5px;height:17px}
  .card-page { position:absolute; top:24px; left:24px; right:24px; bottom:24px; z-index:2; display:flex; flex-direction:column; overflow:hidden; border-radius:22px; }
  .card-watermark { position:absolute; top:24px; left:24px; right:24px; bottom:24px; opacity:.08; z-index:1; pointer-events:none; }
  .card-watermark img { position:absolute; top:50%; left:50%; width:75%; height:auto; transform:translate(-50%,-50%); display:none; }

  /* ── DIAGONAL: inset angled colour header, circular logo medallion, badge, footer bar ── */
  .g-top { position:relative; height:250px; flex-shrink:0; }
  /* colour block floats 16px in from the top/sides with a rounded top */
  .g-cutwrap { position:absolute; top:16px; left:16px; right:16px; bottom:0; border-radius:18px 18px 0 0; overflow:hidden; z-index:0; }
  .g-cut { position:absolute; inset:0; clip-path:polygon(0 0, 100% 0, 100% 68%, 0 100%); }
  .g-txt { position:relative; z-index:2; max-width:290px; padding:42px 0 0 42px; }
  .g-name { font-family:'Raleway',sans-serif; font-weight:800; font-size:21px; line-height:1.12; color:#fff; text-transform:uppercase; letter-spacing:.02em; }
  .g-sub { font-family:'Lato',sans-serif; font-size:9px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.88); margin-top:10px; }
  .g-badge { position:absolute; z-index:3; top:36px; right:50px; width:64px; height:64px; border-radius:50%; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; box-shadow:0 3px 10px rgba(0,0,0,.14); }
  .g-badge .n { font-size:7px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#98a0a7; }
  .g-badge .v { font-family:'Oswald',sans-serif; font-weight:700; font-size:12.5px; color:#171c21; line-height:1; margin-top:3px; white-space:nowrap; }

  .g-medal { position:absolute; z-index:4; left:50%; transform:translateX(-50%); bottom:-94px; width:196px; height:196px; border-radius:50%; background:#fff; box-shadow:0 5px 18px rgba(0,0,0,.13); display:flex; align-items:center; justify-content:center; }
  .g-medal img { height:150px; width:auto; max-width:160px; object-fit:contain; }
  .g-medal .ph { font-family:'Raleway',sans-serif; font-weight:800; font-size:19px; text-transform:uppercase; text-align:center; color:#22282e; padding:0 16px; line-height:1.2; }

  .g-body { flex:1; min-height:0; background:transparent; padding:110px 26px 0; display:flex; flex-direction:column; position:relative; z-index:2; }
  .g-desc { font-size:12.5px; font-weight:400; line-height:1.55; color:#33383d; text-align:center; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

  .g-lbl { font-family:'Lato',sans-serif; font-weight:700; font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:#98a0a7; text-align:center; margin-top:15px; }
  .g-terps { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:9px; }
  .g-terps span { font-size:12.5px; font-weight:700; color:#22282e; padding:7px 14px; border-radius:999px; }
  .g-disc { font-size:6.5px; color:#14181c; line-height:1.35; text-align:center; margin-top:7px; }

  .g-cann { display:flex; justify-content:center; gap:12px; margin-top:16px; }
  .g-cann div { flex:0 0 auto; min-width:104px; border-radius:16px; padding:9px 18px; text-align:center; }
  .g-cann .n { font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#2a3036; opacity:.75; }
  .g-cann .v { font-family:'Oswald',sans-serif; font-weight:700; font-size:16px; color:#171c21; line-height:1; margin-top:3px; }

  .g-foot { margin:auto 0 20px; border-radius:16px; padding:13px 22px; display:flex; }
  .g-foot div { flex:1; text-align:center; }
  .g-foot .n { font-size:7.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.8); }
  .g-foot .v { font-size:10.5px; font-weight:700; color:#fff; margin-top:2px; }

  @media print {
    html, body { background:#fff; margin:0; padding:0; }
    body { display:block; padding-top:1.25in; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .toolbar { display:none; }
    .card-shell { box-shadow:none; margin:0 auto; page-break-inside:avoid; break-inside:avoid; }
  }
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">🖨 Print / Save PDF</button>
  <span class="hint">Diagonal style · Letter · Margins: None · Background graphics: ON</span>
</div>

<div class="card-shell">
  <div class="crop tl-h"></div><div class="crop tl-v"></div>
  <div class="crop tr-h"></div><div class="crop tr-v"></div>
  <div class="crop bl-h"></div><div class="crop bl-v"></div>
  <div class="crop br-h"></div><div class="crop br-v"></div>
  <div class="card-watermark" id="card-watermark"><img id="card-watermark-img" alt=""></div>
  <div class="card-page">
    <div class="g-top">
      <div class="g-cutwrap"><div class="g-cut" id="banner"></div></div>
      <div class="g-txt">
        <div class="g-name" id="name"></div>
        <div class="g-sub" id="kicker"></div>
      </div>
      <div class="g-badge"><div class="n">THC</div><div class="v" id="thcBadge"></div></div>
      <div class="g-medal" id="logo"></div>
    </div>
    <div class="g-body">
      <p class="g-desc" id="desc"></p>
      <div class="g-lbl">Prominent Terpenes</div>
      <div class="g-terps" id="terps"></div>
      <div class="g-disc">Ask your budtender for current terpene information as dominant terpenes can change.</div>
      <div class="g-cann">
        <div id="thcCell"><div class="n">THC</div><div class="v" id="thc"></div></div>
        <div id="cbdCell"><div class="n">CBD</div><div class="v" id="cbd"></div></div>
      </div>
      <div class="g-foot" id="foot">
        <div><div class="n">Strain</div><div class="v" id="species"></div></div>
        <div><div class="n">Region</div><div class="v" id="region"></div></div>
        <div><div class="n">Category</div><div class="v" id="brand"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function round1(n){ return Math.round(n); }
var params = new URLSearchParams(window.location.search);
var DEMO = ['ABC Hash Glass Tipped Infused Pre-Roll LTO','Tenzo','HYBRID','Pre-Roll','380','440','0','10',
  'Beta-Caryophyllene','Limonene','Linalool','British Columbia','',
  'Hybrid hash-infused pre-roll with a sweet apple and banana flavour.'
].join('~|~|~');
var parts = (params.get('data') || DEMO).split('~|~|~');
var productName=parts[0]||'', brandName=parts[1]||'', species=parts[2]||'', subcategory=parts[3]||'';
var thcMin=parts[4]||'', thcMax=parts[5]||'', cbdMin=parts[6]||'', cbdMax=parts[7]||'';
var terp1=(parts[8]||'').trim(), terp2=(parts[9]||'').trim(), terp3=(parts[10]||'').trim();
var region=parts[11]||'', logoUrl=parts[12]||'', description=parts[13]||'';
var wmUrl=parts[14]||'', wmX=parts[15]||'0', wmY=parts[16]||'0', wmSize=parts[17]||'75', wmOpacity=parts[18]||'8';
var thcMinPiece=parts[19]||'', thcMaxPiece=parts[20]||'', cbdMinPiece=parts[21]||'', cbdMaxPiece=parts[22]||'';
var thcOverride=(parts[23]||'').trim(), cbdOverride=(parts[24]||'').trim();

/* ORIGINAL PALETTE */
var sp = species.toUpperCase();
var cBanner='#74C6EA', cThc='#97D6EF', cCbd='#ACDFF2', cTerp='#DBF0FA';
if (sp.indexOf('SATIVA')!==-1){ cBanner='#F58A34'; cThc='#F7A45D'; cCbd='#F8B670'; cTerp='#FCDFBC'; }
else if (sp.indexOf('HYBRID')!==-1||sp.indexOf('BLEND')!==-1){ cBanner='#5AA06E'; cThc='#7CB88F'; cCbd='#9DCBAA'; cTerp='#D1EBDA'; }

var combined=(subcategory+' ').toUpperCase();
var pctCats=['FLOWER','PRE-ROLL','PRE-ROLLS','PREROLL','INHALABLE','SEEDS','SEED'];
var mgCats=['BEVERAGE','BEVERAGES','EDIBLE','EDIBLES','TOPICAL','TOPICALS'];
var pieceRe=/\b(caps|capsule|capsules|tablet|tablets|softgel|softgels)\b/i;
var usePiece=pieceRe.test((productName||'')+' '+(description||''));
var usePct=pctCats.some(function(c){return combined.indexOf(c)!==-1;});
var useMgOnly=mgCats.some(function(c){return combined.indexOf(c)!==-1;});
var thcLo,thcHi,cbdLo,cbdHi,divideBy10,unit;
if (usePiece){
  var hasP=(thcMinPiece!==''&&!isNaN(parseFloat(thcMinPiece)))||(thcMaxPiece!==''&&!isNaN(parseFloat(thcMaxPiece)));
  var hasC=(cbdMinPiece!==''&&!isNaN(parseFloat(cbdMinPiece)))||(cbdMaxPiece!==''&&!isNaN(parseFloat(cbdMaxPiece)));
  thcLo=hasP?thcMinPiece:thcMin; thcHi=hasP?thcMaxPiece:thcMax;
  cbdLo=hasC?cbdMinPiece:cbdMin; cbdHi=hasC?cbdMaxPiece:cbdMax;
  divideBy10=false; unit=' mg';
} else {
  thcLo=thcMin; thcHi=thcMax; cbdLo=cbdMin; cbdHi=cbdMax;
  if (usePct){ divideBy10=true; unit='%'; }
  else if (useMgOnly){ divideBy10=false; unit=' mg'; }
  else { divideBy10=false; unit=' mg/g'; }
}
function fmtRange(min,max){
  var lo=parseFloat(min), hi=parseFloat(max);
  if (divideBy10){ lo=lo/10; hi=hi/10; }
  if (isNaN(lo)&&isNaN(hi)) return '—';
  if (lo===0||isNaN(lo)) return '< '+round1(hi)+unit;
  if (isNaN(hi)||lo===hi) return round1(lo)+unit;
  return round1(lo)+'–'+round1(hi)+unit;
}
var norm=[terp1,terp2,terp3].map(function(t){return t.toUpperCase().replace(/[_\s]/g,'');});
var terpsHtml;
if (!terp1) terpsHtml='<span>Some terpenes may be present</span>';
else if (norm.indexOf('TERPENESREMOVED')!==-1) terpsHtml='<span>Terpenes Removed</span>';
else if (norm.indexOf('TERPENEVARIES')!==-1||norm.indexOf('TERPENESVARY')!==-1) terpsHtml='<span>Terpenes Vary</span>';
else terpsHtml=[terp1,terp2,terp3].filter(Boolean).map(function(t){return '<span>'+esc(t.replace(/_/g,'-'))+'</span>';}).join('');

document.getElementById('banner').style.background = cBanner;
document.getElementById('foot').style.background = cBanner;
document.getElementById('name').textContent = (productName||'').replace(/-/g,'‑');
document.getElementById('kicker').textContent = [brandName, species].filter(Boolean).join('  ·  ').toUpperCase();
document.getElementById('logo').innerHTML = logoUrl
  ? '<img src="'+esc(logoUrl)+'" alt="">'
  : '<div class="ph">'+esc(brandName||'BRAND')+'</div>';
document.getElementById('desc').textContent = description;
var terpsEl=document.getElementById('terps'); terpsEl.innerHTML=terpsHtml;
Array.prototype.forEach.call(terpsEl.children, function(el){ el.style.background=cTerp; });
document.getElementById('thcCell').style.background = cThc;
document.getElementById('cbdCell').style.background = cCbd;
var thcTxt = thcOverride!==''?thcOverride:fmtRange(thcLo,thcHi);
document.getElementById('thc').textContent = thcTxt;
document.getElementById('thcBadge').textContent = thcTxt;
document.getElementById('cbd').textContent = cbdOverride!==''?cbdOverride:fmtRange(cbdLo,cbdHi);
document.getElementById('species').textContent = species||'—';
document.getElementById('region').textContent = region||'—';
document.getElementById('brand').textContent = (subcategory||'').toUpperCase();
document.title = productName || 'Product Card';

if (wmUrl){
  var wmImg=document.getElementById('card-watermark-img');
  wmImg.src=decodeURIComponent(wmUrl); wmImg.style.display='block';
  wmImg.style.width=(parseFloat(wmSize)||75)+'%';
  wmImg.style.transform='translate(-50%,-50%) translate('+(parseFloat(wmX)||0)+'px,'+(parseFloat(wmY)||0)+'px)';
  document.getElementById('card-watermark').style.opacity=(parseFloat(wmOpacity)||8)/100;
}
</script>
</body>
</html>
