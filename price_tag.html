<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Tags — Avery 6450</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#e8e8e8; font-family:Arial, Helvetica, sans-serif; }

  .toolbar {
    position:fixed; top:0; left:0; right:0; z-index:900;
    background:#1f2a24; color:#fff; padding:10px 16px;
    display:flex; align-items:center; gap:10px; font-size:13px; flex-wrap:wrap;
  }
  .toolbar b { font-weight:700; }
  .counter { background:#2f3d35; padding:5px 10px; border-radius:20px; font-weight:700; font-size:12px; }
  .tb-btn {
    background:#4caf72; color:#fff; border:none; border-radius:6px;
    padding:8px 14px; font-family:inherit; font-weight:700; font-size:13px; cursor:pointer;
  }
  .tb-btn.ghost { background:#3a4a42; }
  .tb-btn.warn  { background:#7a3a3a; }
  .tb-btn:hover { filter:brightness(1.08); }
  .tb-chk { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; }
  .hint { color:#b9c7bf; font-size:12px; margin-left:auto; }

  .sheet-wrap { padding:60px 0 40px; display:flex; justify-content:center; }
  .sheet { position:relative; width:8.5in; height:11in; background:#fff; box-shadow:0 2px 18px rgba(0,0,0,.18); }

  .label {
    position:absolute; width:1in; height:1in;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:11px; text-align:center; overflow:hidden; line-height:1;
  }
  .label.guide { border:0.5px dashed #c8c8c8; border-radius:50%; }
  .size  { font-weight:400; font-size:13px; color:#111; }
  .price { font-weight:400; font-size:21px; letter-spacing:-0.01em; color:#000; }

  .overlay { position:fixed; inset:0; z-index:1000; background:rgba(20,28,24,.55); display:flex; align-items:center; justify-content:center; }
  .overlay.hidden { display:none; }
  .modal { background:#fff; width:330px; max-width:92vw; border-radius:12px; padding:22px; box-shadow:0 14px 50px rgba(0,0,0,.35); position:relative; }
  .modal h2 { font-size:17px; font-weight:800; color:#1f2a24; margin-bottom:3px; }
  .modal p.sub { font-size:12px; color:#6c7a72; margin-bottom:16px; }
  .modal label { display:block; font-size:12px; font-weight:700; margin-bottom:5px; color:#243; }
  .modal input[type=text] { width:100%; padding:10px 11px; border:1px solid #cdd6d0; border-radius:7px; font-family:inherit; font-size:15px; margin-bottom:14px; }
  .modal .go { width:100%; background:#4caf72; color:#fff; border:none; border-radius:7px; padding:12px; font-family:inherit; font-weight:700; font-size:15px; cursor:pointer; }
  .modal .go:hover { background:#43985f; }
  .modal .x { position:absolute; top:12px; right:14px; border:none; background:none; font-size:20px; color:#9aa7a0; cursor:pointer; line-height:1; }

  @media print {
    html, body { background:#fff; }
    .toolbar, .overlay { display:none !important; }
    .sheet-wrap { padding:0; display:block; }
    .sheet { box-shadow:none; margin:0; }
    @page { size:8.5in 11in; margin:0; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <b>1" Price Tags</b>
    <span class="counter" id="counter">0 / 63</span>
    <button class="tb-btn" onclick="openModal()">+ Add Tag</button>
    <button class="tb-btn ghost" onclick="removeLast()">Remove Last</button>
    <button class="tb-btn warn" onclick="clearAll()">Clear</button>
    <label class="tb-chk"><input type="checkbox" id="guides" onchange="render()"> Cut guides</label>
    <button class="tb-btn" onclick="window.print()">Print / Save PDF</button>
    <span class="hint">Paper <b>Letter</b> &middot; Margins <b>None</b> &middot; Scale <b>100%</b></span>
  </div>

  <div class="sheet-wrap"><div class="sheet" id="sheet"></div></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <button class="x" onclick="closeModal()">&times;</button>
      <h2>Add a Price Tag</h2>
      <p class="sub">Adds one tag to the next open spot on the sheet.</p>
      <label>Price</label>
      <input type="text" id="m-price" placeholder="27.99" inputmode="decimal">
      <label>Info line (below price)</label>
      <input type="text" id="m-size" placeholder="3 x 0.5g">
      <button class="go" onclick="addTag()">Add to Sheet</button>
    </div>
  </div>

<script>
  var COLS=7, ROWS=9, TOTAL=COLS*ROWS;
  var FIRST_X=0.88, PITCH_X=1.123333;
  var FIRST_Y=1.00, PITCH_Y=1.125;
  var DIA=1.0;
  var KEY='priceTags';

  var q = new URLSearchParams(location.search);
  var ox = parseFloat(q.get('ox')||'0'); if (isNaN(ox)) ox=0;
  var oy = parseFloat(q.get('oy')||'0'); if (isNaN(oy)) oy=0;

  function $(id){ return document.getElementById(id); }
  function fmtPrice(p){ p=(p||'').trim(); if(!p) return ''; p=p.replace(/^\$/,''); return '$'+p; }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function load(){ try { return JSON.parse(sessionStorage.getItem(KEY)||'[]'); } catch(e){ return []; } }
  function save(t){ sessionStorage.setItem(KEY, JSON.stringify(t)); }

  function render(){
    var tags = load();
    var guides = $('guides').checked;
    var sheet = $('sheet');
    sheet.innerHTML = '';
    sheet.style.transform = (ox||oy) ? 'translate('+ox+'mm,'+oy+'mm)' : '';
    for (var i=0;i<TOTAL;i++){
      var r=Math.floor(i/COLS), c=i%COLS;
      var left=(FIRST_X+c*PITCH_X)-DIA/2;
      var top =(FIRST_Y+r*PITCH_Y)-DIA/2;
      var lab=document.createElement('div');
      lab.className='label'+(guides?' guide':'');
      lab.style.left=left+'in'; lab.style.top=top+'in';
      if (i<tags.length){
        var priceTxt=fmtPrice(tags[i].price), sizeTxt=(tags[i].size||'').trim();
        lab.innerHTML =
          (sizeTxt ?'<div class="size">' +esc(sizeTxt) +'</div>':'') +
          (priceTxt?'<div class="price">'+esc(priceTxt)+'</div>':'');
      }
      sheet.appendChild(lab);
    }
    $('counter').textContent = tags.length + ' / ' + TOTAL;
  }

  function openModal(){ $('overlay').classList.remove('hidden'); $('m-price').value=''; $('m-size').value=''; $('m-price').focus(); }
  function closeModal(){ $('overlay').classList.add('hidden'); }

  function addTag(){
    var price=$('m-price').value, size=$('m-size').value;
    if (!price.trim() && !size.trim()){ $('m-price').focus(); return; }
    var tags=load();
    if (tags.length>=TOTAL){ alert('The sheet is full (63 tags). Print or Clear before adding more.'); closeModal(); return; }
    tags.push({price:price, size:size});
    save(tags);
    render();
    closeModal();
  }

  function removeLast(){ var t=load(); t.pop(); save(t); render(); }
  function clearAll(){ if(confirm('Clear all tags from the sheet?')){ save([]); render(); } }

  ['m-price','m-size'].forEach(function(id){
    $(id).addEventListener('keydown', function(e){ if(e.key==='Enter') addTag(); if(e.key==='Escape') closeModal(); });
  });
  $('overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

  // On open: if price/size came in the URL, prefill; otherwise pop the modal to add one.
  window.addEventListener('DOMContentLoaded', function(){
    render();
    var p=q.get('price'), s=q.get('size');
    openModal();
    if (p&&p.trim()) $('m-price').value=p.replace(/^\$/,'');
    if (s&&s.trim()) $('m-size').value=s;
  });
</script>
</body>
</html>
