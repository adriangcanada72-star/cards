<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Tag — Avery 6450</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#e8e8e8; font-family:'Raleway',sans-serif; }

  /* ---- Screen toolbar (never prints) ---- */
  .toolbar {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    background:#1f2a24; color:#fff; padding:10px 16px;
    display:flex; align-items:center; gap:14px; font-size:13px;
  }
  .toolbar b { font-weight:700; }
  .toolbar .hint { color:#b9c7bf; font-size:12px; }
  .print-btn {
    background:#4caf72; color:#fff; border:none; border-radius:6px;
    padding:8px 18px; font-family:'Raleway',sans-serif; font-weight:700;
    font-size:13px; cursor:pointer;
  }
  .print-btn:hover { background:#43985f; }
  .sheet-wrap { padding:64px 0 40px; display:flex; justify-content:center; }

  /* ---- The physical sheet: US Letter ---- */
  .sheet {
    position:relative;
    width:8.5in; height:11in;
    background:#fff;
    box-shadow:0 2px 18px rgba(0,0,0,.18);
  }

  /* ---- One 1" circular label ---- */
  .label {
    position:absolute;
    width:1in; height:1in;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:11px;
    text-align:center;
    overflow:hidden;
    line-height:1;
  }
  .label.guide { border:0.5px dashed #c8c8c8; border-radius:50%; }

  .size {
    font-family:Arial, Helvetica, sans-serif;
    font-weight:400;
    font-size:13px;
    color:#111;
  }
  .price {
    font-family:Arial, Helvetica, sans-serif;
    font-weight:400;
    font-size:21px;
    letter-spacing:-0.01em;
    color:#000;
  }

  @media print {
    html, body { background:#fff; }
    .toolbar, .sheet-wrap { all:unset; }
    .toolbar { display:none !important; }
    .sheet-wrap { display:block; padding:0; }
    .sheet { box-shadow:none; margin:0; }
    @page { size:8.5in 11in; margin:0; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <b>Avery 6450 — 1" Price Tags</b>
    <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
    <span class="hint">Print settings: Paper <b>Letter</b> · Margins <b>None</b> · Scale <b>100%</b></span>
  </div>

  <div class="sheet-wrap">
    <div class="sheet" id="sheet"></div>
  </div>

<script>
  // ---- Avery 6450 geometry (inches) ----
  var COLS = 7, ROWS = 9, TOTAL = COLS * ROWS;      // 63
  var FIRST_X = 0.88, PITCH_X = 1.123333;           // horizontal: center of col 0, then pitch
  var FIRST_Y = 1.00, PITCH_Y = 1.125;              // vertical: center of row 0, then pitch
  var DIA = 1.0;

  // ---- URL params ----
  var q = new URLSearchParams(location.search);
  var price = (q.get('price') || '').trim();
  var size  = (q.get('size')  || '').trim();
  var skip  = parseInt(q.get('skip')  || '0', 10);  if (isNaN(skip)  || skip < 0)  skip = 0;
  var count = q.get('count') !== null ? parseInt(q.get('count'), 10) : (TOTAL - skip);
  if (isNaN(count) || count < 0) count = TOTAL - skip;
  var ox = parseFloat(q.get('ox') || '0'); if (isNaN(ox)) ox = 0;   // alignment nudge, mm
  var oy = parseFloat(q.get('oy') || '0'); if (isNaN(oy)) oy = 0;   // alignment nudge, mm
  var guides = q.get('guides') === '1';

  function fmtPrice(p) {
    if (!p) return '';
    p = p.replace(/^\$/, '');
    return '$' + p;
  }

  var priceTxt = fmtPrice(price);
  var sizeTxt  = size;

  var sheet = document.getElementById('sheet');
  // apply printer-alignment nudge to whole sheet
  if (ox || oy) sheet.style.transform = 'translate(' + ox + 'mm,' + oy + 'mm)';

  for (var i = 0; i < TOTAL; i++) {
    var r = Math.floor(i / COLS);
    var c = i % COLS;
    var left = (FIRST_X + c * PITCH_X) - DIA / 2;
    var top  = (FIRST_Y + r * PITCH_Y) - DIA / 2;

    var lab = document.createElement('div');
    lab.className = 'label' + (guides ? ' guide' : '');
    lab.style.left = left + 'in';
    lab.style.top  = top  + 'in';

    var filled = (i >= skip) && (i < skip + count);
    if (filled && (priceTxt || sizeTxt)) {
      lab.innerHTML =
        (sizeTxt  ? '<div class="size">'  + sizeTxt  + '</div>' : '') +
        (priceTxt ? '<div class="price">' + priceTxt + '</div>' : '');
    }
    sheet.appendChild(lab);
  }
</script>
</body>
</html>
