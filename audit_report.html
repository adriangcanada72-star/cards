<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Compliance Report — Greenery Cannabis Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f5f5f5;color:#2D3139;line-height:1.6}
.report{max-width:680px;margin:40px auto;background:#fff;border-radius:12px;box-shadow:0 2px 20px rgba(0,0,0,.08);overflow:hidden}
.header{text-align:center;padding:36px 40px 28px;border-bottom:3px solid #31AA64}
.header img{height:56px;margin-bottom:12px}
.header h1{font-family:'Playfair Display',serif;font-size:22px;color:#2D3139;margin-bottom:2px}
.header .subtitle{font-size:13px;color:#888}
.staff-banner{padding:28px 40px;background:#f9faf9;border-bottom:1px solid #eee;display:flex;align-items:center;gap:20px}
.staff-avatar{width:56px;height:56px;border-radius:50%;background:#31AA64;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px;flex-shrink:0}
.staff-info h2{font-size:20px;font-weight:600}
.staff-info .meta{font-size:13px;color:#888;margin-top:2px}
.body{padding:32px 40px}
.section-title{font-family:'Playfair Display',serif;font-size:16px;color:#2D3139;padding-bottom:8px;border-bottom:2px solid #31AA64;margin-bottom:16px;margin-top:28px}
.section-title:first-child{margin-top:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stat-box{padding:20px;background:#f9faf9;border-radius:8px;border-left:4px solid #31AA64}
.stat-box.warn{border-left-color:#d9534f}
.stat-box .value{font-size:26px;font-weight:700;color:#31AA64}
.stat-box.warn .value{color:#d9534f}
.stat-box .label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.cert-status{margin-top:24px;padding:20px;border-radius:8px;text-align:center;font-weight:600;font-size:15px}
.cert-yes{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.cert-no{background:#fbe9e7;color:#c62828;border:1px solid #ef9a9a}
.footer{padding:24px 40px;border-top:1px solid #eee;text-align:center;font-size:11px;color:#999}
.actions{display:flex;gap:12px;justify-content:center;margin:24px 0}
.btn{display:inline-block;padding:12px 28px;background:#31AA64;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none}
.btn:hover{background:#289956}
.btn-outline{background:transparent;color:#2D3139;border:2px solid #2D3139}
.btn-outline:hover{background:#2D3139;color:#fff}
.error{max-width:500px;margin:80px auto;text-align:center;padding:40px;font-size:16px;color:#888}

@media print{
  body{background:#fff}
  .report{margin:0;box-shadow:none;border-radius:0}
  .actions{display:none!important}
  .header{border-radius:0}
  .stat-box{border:1px solid #ddd;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stat-box .value{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cert-status{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .staff-avatar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="report" id="report"></div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get('name');

if(!name){
  document.getElementById('report').innerHTML = '<div class="error">No staff member specified.</div>';
}else{
  const sir_passes = params.get('sirp') || '0';
  const sir_attempts = params.get('sira') || '0';
  const sir_mpasses = params.get('sirmp') || '0';
  const sir_mattempts = params.get('sirma') || '0';
  const modules = params.get('mod') || '0';
  const final_exam = params.get('final') || '0';
  const certified = params.get('cert') || 'false';
  const role = params.get('role') || '';
  const store = params.get('store') || '450121';

  const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase();
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'});

  const isCert = certified === 'true';
  const finalVal = parseInt(final_exam) || 0;

  document.title = `Compliance Report — ${name}`;

  document.getElementById('report').innerHTML = `
    <div class="header">
      <img src="https://adriangcanada72-star.github.io/cards/GreeneryLogoLeafOnly.png" alt="Greenery" onerror="this.style.display='none'">
      <h1>Staff Compliance Report</h1>
      <div class="subtitle">Greenery Cannabis Boutique — Store 14, License ${store} — Penticton, BC</div>
    </div>

    <div class="staff-banner">
      <div class="staff-avatar">${initials}</div>
      <div class="staff-info">
        <h2>${name}</h2>
        <div class="meta">${role} • Report generated ${dateStr}</div>
      </div>
    </div>

    <div class="body">
      <h3 class="section-title">Selling It Right — Monthly Compliance</h3>
      <div class="stat-grid">
        <div class="stat-box${parseInt(sir_mpasses)<1&&parseInt(sir_mattempts)>0?' warn':''}">
          <div class="value">${sir_mpasses} / ${sir_mattempts}</div>
          <div class="label">This Month — Passes / Attempts</div>
        </div>
        <div class="stat-box">
          <div class="value">${sir_passes} / ${sir_attempts}</div>
          <div class="label">All Time — Passes / Attempts</div>
        </div>
      </div>

      <h3 class="section-title">Terpene Sommelier Certification</h3>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="value">${modules} / 10</div>
          <div class="label">Modules Passed</div>
        </div>
        <div class="stat-box${finalVal>0?'':' warn'}">
          <div class="value">${finalVal > 0 ? 'Pass' : 'Not Passed'}</div>
          <div class="label">Final Exam</div>
        </div>
      </div>

      <div class="cert-status ${isCert?'cert-yes':'cert-no'}">
        ${isCert ? '✓ Certified Terpene Sommelier' : '✗ Not Yet Certified'}
      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="window.print()">Print / Save as PDF</button>
      <a class="btn btn-outline" href="javascript:window.close()">Close</a>
    </div>

    <div class="footer">
      This report was generated from The Terpene Sommelier app for compliance and audit purposes.<br>
      Greenery Cannabis Boutique — Store 14, License ${store} — Penticton, BC
    </div>
  `;
}
</script>
</body>
</html>
